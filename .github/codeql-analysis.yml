# --- Automated SAST Pipeline for K-Guard ---
# International standard: Cisco DevNet & OSSF compliant
# Purpose: Performs static application security testing (SAST) using GitHub CodeQL.

name: "CodeQL Security Scan"

on:
  push:
    branches: [ "main" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  schedule:
    - cron: '20 4 * * 1' # Runs automatically every Monday at 04:20 UTC

jobs:
  analyze:
    name: Analyze Code
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      actions: read
      contents: read
      security-events: write # Required to upload SARIF results to GitHub Security tab

    strategy:
      fail-fast: false
      matrix:
        # Analyzes both the Python backend and the Vue.js frontend
        language: [ 'python', 'javascript' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Initializes the CodeQL tools for scanning
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      # Autobuild attempts to build any compiled languages.
      # For Python and JavaScript, it simply extracts the source code.
      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      # Performs the actual static analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"