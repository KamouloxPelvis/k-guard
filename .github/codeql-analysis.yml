name: "🛡️ K-Guard Security Scan (CodeQL)"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 1 * * 6' # Weekly scan every Saturday at 01:30

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      # Required permissions to update the Security dashboard with scan results
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript', 'python' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Initialize CodeQL tools for the specified languages
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        # Use extended security queries to detect info leaks and quality issues
        queries: security-extended,security-and-quality

    # Autobuild attempts to compile the code (crucial for frontend/JS environments)
    - name: Autobuild
      uses: github/codeql-action/autobuild@v3

    # Execute the actual analysis and upload results to GitHub Security tab
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{ matrix.language }}"