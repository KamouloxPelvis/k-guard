name: K-GUARD Deployment

on:
  push:
    branches:
      - main

# SRE Best Practice: Enforce global least privilege for GitHub Actions
permissions:
  contents: read

jobs:
  build_images:
    runs-on: ubuntu-latest
    # Override for specific job requiring registry push access
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push K-Guard image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          push: true
          # SRE Best Practice: Tagging with 'latest' AND a unique 'SHA' to bypass cache
          tags: |
            ghcr.io/kamouloxpelvis/kguard-app:latest
            ghcr.io/kamouloxpelvis/kguard-app:${{ github.sha }}

  deploy_to_k3s:
    needs: build_images
    runs-on: self-hosted
    environment: VPS_KAMATERA_UBUNTU_THINKPAD_e11 
    steps:
      - name: Checkout code
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6

      # Isolation: Copy manifests locally
      - name: Copy K8s manifests locally
        run: |
          mkdir -p /home/kamal/deployments/k-guard
          cp -r k8s/* /home/kamal/deployments/k-guard/

      - name: Deploy to K3s (Local Execution)
        run: |
          echo "🚀 Synchronizing Infrastructure with image SHA: ${{ github.sha }}..."
          
          # Applique les manifestes directement
          kubectl apply -f k8s/ -n k-guard
          
          # Force l'image spécifique
          kubectl set image deployment/kguard-deployment kguard-app=ghcr.io/kamouloxpelvis/kguard-app:${{ github.sha }} -n k-guard
          
          # Vérifie la santé
          kubectl rollout status deployment kguard-deployment -n k-guard --timeout=300s

      - name: Discord Notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            MESSAGE="🛡️ **K-GUARD** (k3s): Deployment successful! SHA ${{ github.sha }} is live. ✅"
          else
            MESSAGE="⚠️ **K-GUARD** (k3s): Critical deployment failure on SHA ${{ github.sha }}! ❌"
          fi
          curl -X POST -H "Content-Type: application/json" \
          -d "{\"content\": \"$MESSAGE\"}" \
          ${{ secrets.DISCORD_WEBHOOK_URL }}