name: K-GUARD Deployment

on:
  push:
    branches:
      - main
      - feat/*

permissions:
  contents: read

jobs:
  security_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Bandit
        run: pip install bandit
      - name: Run Bandit Scan
        continue-on-error: true
        run: bandit -r . -c bandit.yaml -ll -f html -o security_report.html
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: security_report.html

  build_images:
    needs: security_scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push K-Guard image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/kamouloxpelvis/kguard-app:latest
            ghcr.io/kamouloxpelvis/kguard-app:${{ github.sha }}

  deploy_to_k3s:
    needs: build_images
    runs-on: [self-hosted]
    environment: VPS_KAMATERA_UBUNTU_THINKPAD_e11
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Deploy Infrastructure
        env:
          # Use workspace directory to ensure portability and avoid absolute paths
          KUBECONFIG: ${{ github.workspace }}/kubeconfig.yaml
        run: |
          # 1. Setup Kubeconfig (Idempotent and portable)
          # Copying to workspace allows the runner to manage file permissions without sudo
          cp /etc/rancher/k3s/k3s.yaml "$KUBECONFIG"
          chmod 600 "$KUBECONFIG"
          
          # 2. Determine target environment (Agnostic to user)
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            TARGET_NS="k-guard"
            DEPLOY_NAME="kguard-deployment"
          else
            TARGET_NS="k-guard-green"
            DEPLOY_NAME="kguard-deployment-green"
          fi

          echo "🚀 Preparing deployment to: $TARGET_NS..."
          
          # 3. Locate installer (Portable path resolution)
          INSTALLER_PATH=$(find "$GITHUB_WORKSPACE" -name "kguard-install" | head -n 1)
          
          if [[ -f "$INSTALLER_PATH" ]]; then
            echo "✅ Installer verified: $INSTALLER_PATH"
            chmod +x "$INSTALLER_PATH"
          else
            echo "⚠️ Warning: installer not found, proceeding without it."
          fi
          
          # 4. Update Kubernetes image (Idempotent: only triggers rollout if image changed)
          echo "🚀 Deploying image: ${{ github.sha }}..."
          kubectl set image deployment/"$DEPLOY_NAME" kguard-app=ghcr.io/kamouloxpelvis/kguard-app:${{ github.sha }} -n "$TARGET_NS"
          
          # 5. Verify deployment rollout
          # Waits until the deployment reaches the desired state or times out
          kubectl rollout status deployment/"$DEPLOY_NAME" -n "$TARGET_NS" --timeout=300s

      - name: Discord Notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            MESSAGE="🛡️ **K-GUARD**: Deployment successful! SHA ${{ github.sha }} is live. ✅"
          else
            MESSAGE="⚠️ **K-GUARD**: Critical deployment failure on SHA ${{ github.sha }}! ❌"
          fi
          curl -X POST -H "Content-Type: application/json" -d "{\"content\": \"$MESSAGE\"}" ${{ secrets.DISCORD_WEBHOOK_URL }}ù