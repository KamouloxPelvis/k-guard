name: K-GUARD Deployment

on:
  push:
    branches:
      - main

jobs:
  build_images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push K-Guard image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          push: true
          tags: ghcr.io/kamouloxpelvis/kguard-app:latest

  deploy_to_k3s:
    needs: build_images
    runs-on: ubuntu-latest
    environment: VPS_KAMATERA_UBUNTU_THINKPAD_E11 
    steps:
      - name: Checkout code
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6

      # SRE FIX: Copy manifests to a dedicated sub-directory to avoid root overwriting
      - name: Copy K8s manifests to VPS
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634 # v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.CI_CD_SSH_KEY }}
          source: "k8s/*"
          # Targeted path to ensure we don't move or delete DB/Scripts at root
          target: "/home/kamal/infrastructure/apps/k-guard/k8s/"
          strip_components: 1 # Prevents creating an extra k8s/k8s/ folder

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262 # v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.CI_CD_SSH_KEY }}
          port: 22
          script: |
            echo "🚀 Synchronizing Infrastructure on ${{ secrets.VPS_IP }}..."
            # Apply only the targeted manifests
            kubectl apply -f /home/kamal/infrastructure/apps/k-guard/k8s/ -n k-guard
            # Force the rollout to pull the fresh image and restart background services
            kubectl rollout restart deployment kguard-deployment -n k-guard
            kubectl rollout status deployment kguard-deployment -n k-guard --timeout=300s

      - name: Discord Notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            MESSAGE="🛡️ **K-GUARD** (k3s): Infrastructure recovered and deployed! ✅"
          else
            MESSAGE="⚠️ **K-GUARD** (k3s): Deployment recovery failed! ❌"
          fi
          curl -X POST -H "Content-Type: application/json" \
          -d "{\"content\": \"$MESSAGE\"}" \
          ${{ secrets.DISCORD_WEBHOOK_URL }}