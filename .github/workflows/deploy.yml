name: K-GUARD Deployment

on:
  push:
    branches:
      - main
    paths:
      - 'k8s/**'
      - 'src/**'
      - 'Dockerfile'

jobs:
  build_images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Required to push to GitHub Container Registry
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push K-Guard image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Fixed: repository name must be lowercase to avoid build errors
          tags: ghcr.io/kamouloxpelvis/kguard-app:latest

  deploy_to_k3s:
    needs: build_images
    runs-on: ubuntu-latest
    environment: VPS_KAMATERA_UBUNTU_THINKPAD_E11 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Securely copy Kubernetes manifests to the VPS before applying them
      - name: Copy K8s manifests to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.CI_CD_SSH_KEY }}
          source: "k8s/*"
          target: "/home/kamal/infrastructure/apps/k-guard/"

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.CI_CD_SSH_KEY }}
          port: 22
          script: |
            echo "🚀 Updating infrastructure on ${{ secrets.VPS_IP }}..."
            # Apply the latest manifests copied to the VPS
            kubectl apply -f /home/kamal/infrastructure/apps/k-guard/k8s/ -n k-guard
            # Force pull the new 'latest' image by restarting the deployment
            kubectl rollout restart deployment kguard-deployment -n k-guard
            # Wait for the deployment to stabilize
            kubectl rollout status deployment kguard-deployment -n k-guard --timeout=300s

      - name: Discord Notification
        if: always() # Ensure notification is sent regardless of previous steps status
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            MESSAGE="🛡️ **K-GUARD** (k3s): Deployment successful by **${{ github.actor }}**! ✅"
          else
            MESSAGE="⚠️ **K-GUARD** (k3s): Critical deployment failure! ❌"
          fi
          curl -X POST -H "Content-Type: application/json" \
          -d "{\"content\": \"$MESSAGE\"}" \
          ${{ secrets.DISCORD_WEBHOOK_URL }}