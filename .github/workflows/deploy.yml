name: K-GUARD Deployment

on:
  push:
    branches:
      - main
      - feat/*

# SRE Best Practice: Enforce global least privilege
permissions:
  contents: read

jobs:
  security_scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit Scan
        continue-on-error: true
        run: bandit -r . -c bandit.yaml -ll -f html -o security_report.html
      
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-security-report
          path: security_report.html

  build_images:
    needs: security_scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6
        
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push K-Guard image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/kamouloxpelvis/kguard-app:latest
            ghcr.io/kamouloxpelvis/kguard-app:${{ github.sha }}
            ghcr.io/kamouloxpelvis/kguard-app:v1.5.0

  deploy_to_k3s:
    needs: build_images
    runs-on: self-hosted
    environment: VPS_KAMATERA_UBUNTU_THINKPAD_e11 
    steps:
      - name: Checkout code
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4.1.6

      - name: Determine Environment Context
        id: env_setup
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "TARGET_NS=k-guard" >> $GITHUB_ENV
            echo "DEPLOY_DIR=k8s/blue" >> $GITHUB_ENV
          else
            echo "TARGET_NS=k-guard-green" >> $GITHUB_ENV
            echo "DEPLOY_DIR=green/k8s" >> $GITHUB_ENV
          fi

      - name: Deploy to K3s
        run: |
          echo "🚀 Synchronizing Infrastructure for namespace: $TARGET_NS..."
          
          # Applique les manifestes du dossier spécifique (blue ou green)
          kubectl apply -f $DEPLOY_DIR/ -n $TARGET_NS
          
          # Force l'image spécifique avec le SHA (v1.5.0 est embarqué dans le SHA)
          kubectl set image deployment/kguard-deployment kguard-app=ghcr.io/kamouloxpelvis/kguard-app:${{ github.sha }} -n $TARGET_NS
          
          # Vérifie la santé du déploiement
          kubectl rollout status deployment kguard-deployment -n $TARGET_NS --timeout=300s

      - name: Discord Notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            MESSAGE="🛡️ **K-GUARD** ($TARGET_NS): Deployment successful! SHA ${{ github.sha }} is live. ✅"
          else
            MESSAGE="⚠️ **K-GUARD** ($TARGET_NS): Critical deployment failure on SHA ${{ github.sha }}! ❌"
          fi
          curl -X POST -H "Content-Type: application/json" \
          -d "{\"content\": \"$MESSAGE\"}" \
          ${{ secrets.DISCORD_WEBHOOK_URL }}