- name: "🛡️ K-Guard Sentinel - Universal Dynamic Security"
  hosts: localhost
  connection: local
  gather_facts: no
  vars:
    # International standard comments in English
    ansible_python_interpreter: /usr/bin/python3
    vps_ip: "{{ lookup('env', 'VPS_IP') | default('127.0.0.1', true) }}"

  tasks:
    # 1. SCOPING: Discover all user namespaces (excluding system ones)
    - name: "🔍 Discovery: List target namespaces"
      kubernetes.core.k8s_info:
        kind: Namespace
        label_selectors:
          - "kubernetes.io/metadata.name notin (kube-system, kube-public, kube-node-lease)"
      register: ns_list

    # 2. APP DISCOVERY: Find all pods and their actual container ports
    - name: "🔍 Discovery: Extract Apps and Ports"
      kubernetes.core.k8s_info:
        kind: Pod
        namespace: "{{ item.metadata.name }}"
      loop: "{{ ns_list.resources }}"
      register: pod_results

    - name: "⚙️ Fact: Build Dynamic App Map"
      set_fact:
        # Extracts app label, namespace, and FIRST container port found (dynamic)
        discovered_workloads: "{{ pod_results.results | map(attribute='resources') | flatten | json_query('[*].{app: metadata.labels.app, ns: metadata.namespace, port: spec.containers[0].ports[0].containerPort}') | unique }}"

    # 3. BASELINE: Apply Zero Trust (Default Deny) to all discovered namespaces
    - name: "🔒 Sentinel: Deploy Idempotent Baseline"
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('template', '../templates/core_baseline.j2') }}"
      vars:
        ns_item: "{{ item.metadata.name }}"
        monitoring_enabled: "{{ 'monitoring' in (ns_list.resources | map(attribute='metadata.name') | list) }}"
      loop: "{{ ns_list.resources }}"

    # 4. UNIVERSAL INGRESS: Link Ingress Controller to Apps automatically
    - name: "🔓 Connectivity: Dynamic Ingress Authorization"
      kubernetes.core.k8s:
        state: present
        definition: "{{ lookup('template', '../templates/app_ingress.j2') }}"
      vars:
        app_name: "sentinel-{{ item.app }}-ingress"
        namespace: "{{ item.ns }}"
        app_label: "{{ item.app }}"
        ingress_rules:
          # Perimeter: Public HTTPS (Port constraint applied)
          - { cidr: "0.0.0.0/0", port: 443 }
          # Internal: Allow Ingress Controller (10.42.0.0/16) to reach all app ports
          - { cidr: "10.42.0.0/16" } 
      loop: "{{ discovered_workloads }}"
      when: "item.app is defined and item.app != None"