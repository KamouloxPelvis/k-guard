- name: 🛡️ Network Sentinel - Global Security Strategy
  hosts: localhost
  connection: local
  gather_facts: no
  vars:
    ansible_python_interpreter: /usr/bin/python3
    ns_blog: "blog-prod"
    vps_public_ip: "113.30.191.17"
    protected_namespaces: ["k-guard", "blog-prod", "portfolio-prod", "monitoring", "cert-manager"]

  tasks:
    # --- LAYER 1: TOTAL ISOLATION (ZERO TRUST BASE) ---
    - name: "🔒 Baseline: Default Deny-All (Ingress & Egress)"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: sentinel-default-deny
            namespace: "{{ item }}"
          spec:
            podSelector: {} # Targets all pods in the namespace
            policyTypes: ["Ingress", "Egress"]
      loop: "{{ protected_namespaces }}"

    # --- LAYER 3: CORE INFRASTRUCTURE & DNS ---
    - name: "🔌 Infrastructure: Allow DNS Resolution"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: sentinel-allow-dns
            namespace: "{{ item }}"
          spec:
            podSelector: {}
            policyTypes: ["Egress"]
            egress:
              - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: kube-system
                ports:
                  - protocol: UDP
                    port: 53
                  - protocol: TCP
                    port: 53
      loop: "{{ protected_namespaces }}"
    
    # --- LAYER 4: KUBERNETES API SERVER ACCESS ---
    - name: "🏛️ Infrastructure: Allow Access to K8s API"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: sentinel-allow-k8s-api
            namespace: "{{ item }}"
          spec:
            podSelector: {}
            policyTypes: ["Egress"]
            egress:
              - to:
                - ipBlock:
                    cidr: 10.43.0.1/32 
                ports:
                  - protocol: TCP
                    port: 443
      loop: "{{ protected_namespaces }}"

    # --- LAYER 5: EXTERNAL CLOUD FLOWS (BLOG -> MONGODB & GOOGLE) ---
    - name: "🌐 Cloud: Allow Blog Egress -> DNS & External APIs"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: sentinel-allow-blog-egress-fix
            namespace: "{{ ns_blog }}"
          spec:
            podSelector:
              matchLabels:
                app: blog-devopsnotes
            policyTypes: ["Egress"]
            egress:
              - to:
                - ipBlock:
                    cidr: 0.0.0.0/0
                ports:
                  - protocol: TCP
                    port: 443   # Required for Google Search Indexing APIs
                  - protocol: TCP
                    port: 27017 # Required for MongoDB Atlas connectivity
    
    # --- LAYER 6: K-GUARD EXTERNAL FLOWS (WEBEX CHATOPS) ---
    - name: "🌐 Cloud: Allow K-Guard Egress -> Webex APIs"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: sentinel-allow-kguard-egress-webex
            namespace: "k-guard"
          spec:
            podSelector:
              matchLabels:
                app: k-guard
            policyTypes: ["Egress"]
            egress:
              - to:
                - ipBlock:
                    cidr: 0.0.0.0/0
                ports:
                  - protocol: TCP
                    port: 443   # Required for outbound Cisco Webex Bot notifications

    # --- LAYER 7: MONITORING & HEALTH PROBES ---
    - name: "📊 Sentinel: Allow Monitoring Traffic & Health Probes"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: sentinel-allow-monitoring-probes
            namespace: "{{ item }}"
          spec:
            podSelector: {}
            ingress:
              - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: monitoring
                - ipBlock:
                    cidr: 10.42.0.0/16 # Allow internal Pod-to-Pod monitoring traffic
      loop: "{{ protected_namespaces }}"
    
    # --- LAYER 8: PROM/GRAFANA CROSS-COMMUNICATION ---
    - name: "📊 Sentinel: Allow Prometheus Egress & Grafana Access"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: sentinel-allow-prometheus-scraping
            namespace: "{{ item }}"
          spec:
            podSelector: {} # All pods in the namespace
            policyTypes: ["Egress"]
            egress:
              - to:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: monitoring
                ports:
                  - protocol: TCP
                    port: 9090 # default Prometheus port
      loop: "{{ protected_namespaces }}"

    # --- LAYER 9: INGRESS MANAGEMENT (WEB TRAFFIC) ---
    - name: "🔓 Connectivity: Allow Ingress Controller -> Applications"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: sentinel-allow-ingress-to-apps
            namespace: "{{ item }}"
          spec:
            podSelector: {} 
            policyTypes: ["Ingress"]
            ingress:
              - from:
                - namespaceSelector:
                    matchLabels:
                      kubernetes.io/metadata.name: ingress-nginx
                ports:
                  - protocol: TCP
                    port: 80
                  - protocol: TCP
                    port: 443
                  - protocol: TCP
                    port: 5000 
                  - protocol: TCP
                    port: 8000 
                  - protocol: TCP
                    port: 8443 
      loop: "{{ protected_namespaces }}"

    # --- LAYER 10: VPS HOST -> K-GUARD SECURE ACCESS ---
    - name: "🛡️ Sentinel: Allow VPS Host (Local Nginx) -> K-Guard Access"
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: networking.k8s.io/v1
          kind: NetworkPolicy
          metadata:
            name: sentinel-allow-host-to-kguard
            namespace: "k-guard"
          spec:
            podSelector:
              matchLabels:
                app: k-guard
            policyTypes: ["Ingress"]
            ingress:
              - from:
                - ipBlock:
                    cidr: "{{ vps_public_ip }}/32"
                - ipBlock:
                    cidr: 127.0.0.1/32
                ports:
                  - protocol: TCP
                    port: 8000
                  - protocol: TCP
                    port: 8443