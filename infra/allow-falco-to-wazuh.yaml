apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-falco-to-wazuh
  namespace: wazuh
spec:
  podSelector:
    matchLabels:
      app: wazuh-manager
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: falco
    ports:
    - protocol: TCP
      port: 1514
