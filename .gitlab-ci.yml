stages:
  - build
  - deploy

# --- ÉTAPE 1 : CONSTRUCTION ET PUSH ---
build_images:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - echo "🔐 Connexion au registre GitLab..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - echo "🛠️ Build de l'image K-Guard..."
    - docker build -t $CI_REGISTRY_IMAGE/kguard-app:latest .
    - echo "🚀 Push vers le registre..."
    - docker push $CI_REGISTRY_IMAGE/kguard-app:latest
  only:
    - main

# --- ÉTAPE 2 : DÉPLOIEMENT SUR LE CLUSTER K3S ---
deploy_to_k3s:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client curl
    - eval $(ssh-agent -s)
    - echo "$CI_CD_SSH_KEY" > temp_raw
    - sed -i 's/-----BEGIN OPENSSH PRIVATE KEY-----/-----BEGIN OPENSSH PRIVATE KEY-----\n/' temp_raw
    - sed -i 's/-----END OPENSSH PRIVATE KEY-----/\n-----END OPENSSH PRIVATE KEY-----/' temp_raw
    - cat temp_raw | tr -d '\r' > temp_key
    - chmod 600 temp_key
    - ssh-add temp_key || (cat temp_key && exit 1) 
    - rm temp_raw temp_key

  script:
    - echo "🚀 Mise à jour du cluster k3s sur $VPS_IP..."
    - ssh $VPS_USER@$VPS_IP "kubectl rollout restart deployment kguard-deployment -n k-guard"
    - ssh $VPS_USER@$VPS_IP "kubectl rollout status deployment kguard-deployment -n k-guard --timeout=60s"

  after_script:
    - |
      if [ "$CI_JOB_STATUS" == "success" ]; then
        curl -X POST -H "Content-Type: application/json" \
        -d "{\"content\": \"🛡️ **K-GUARD** (k3s) : Déploiement réussi par **$GITLAB_USER_NAME** ! ✅\"}" \
        $DISCORD_WEBHOOK_URL
      else
        curl -X POST -H "Content-Type: application/json" \
        -d "{\"content\": \"⚠️ **K-GUARD** (k3s) : Échec critique du déploiement ! ❌\"}" \
        $DISCORD_WEBHOOK_URL
      fi