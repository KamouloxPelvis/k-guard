stages:
  - build
  - deploy

# --- ÉTAPE 1 : CONSTRUCTION ET PUSH ---
build_images:
  stage: build
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  script:
    - echo "🔐 Connexion au registre GitLab..."
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - echo "🛠️ Build de l'image K-Guard..."
    # On build l'image à la racine pour englober frontend et backend si besoin
    - docker build -t $CI_REGISTRY_IMAGE/kguard-app:latest .
    - echo "🚀 Push vers le registre..."
    - docker push $CI_REGISTRY_IMAGE/kguard-app:latest
  only:
    - main

# --- ÉTAPE 2 : DÉPLOIEMENT SUR LE VPS ---
deploy_to_vps:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    # Ta clé CI_CD_SSH_KEY doit être dans les variables CI/CD de GitLab
    - echo "$CI_CD_SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    - ssh-keyscan $VPS_IP >> ~/.ssh/known_hosts
    - chmod 644 ~/.ssh/known_hosts

  script:
    - echo "🚀 Mise à jour du VPS $VPS_IP..."
    # On force le pull de la nouvelle image et le redémarrage des containers
    - ssh $VPS_USER@$VPS_IP "cd /home/kamal/infrastructure/apps/k-guard && docker compose pull && docker compose up -d"

  after_script:
    - |
      if [ "$CI_JOB_STATUS" == "success" ]; then
        curl -X POST -H "Content-Type: application/json" \
        -d "{\"content\": \"🚀 **K-GUARD** déployé avec succès sur le VPS par **$GITLAB_USER_NAME** ! \nStatut: ✅ Success\"}" \
        $DISCORD_WEBHOOK_URL
      else
        curl -X POST -H "Content-Type: application/json" \
        -d "{\"content\": \"⚠️ **K-GUARD** : Échec du déploiement ! \nConsulte les logs ici : $CI_PROJECT_URL/-/jobs/$CI_JOB_ID\"}" \
        $DISCORD_WEBHOOK_URL
      fi
  
  only:
    - main