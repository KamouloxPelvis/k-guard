apiVersion: elasticsearch.k8s.elastic.co/v1
kind: Elasticsearch
metadata:
  name: elasticsearch
  namespace: logging
spec:
  version: 8.17.0 # Utilise une version stable récente
  nodeSets:
  - name: default
    count: 1
    config:
      node.store.allow_mmap: false # Important pour certains VPS
    podTemplate:
      spec:
        containers:
        - name: elasticsearch
          resources:
            limits:
              memory: 1536Mi
              cpu: 1
            requests:
              memory: 1Gi
              cpu: 0.5
