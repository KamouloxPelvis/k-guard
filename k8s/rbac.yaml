# 1. Identité du ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k-guard-sa
  namespace: k-guard

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k-guard-cluster-role
rules:
  # 1. OBSERVABILITÉ : Lecture seule globale
  - apiGroups: [""]
    resources: ["namespaces", "nodes", "events", "services"]
    verbs: ["get", "list", "watch"]

  # 2. GESTION DES PODS : Lecture + Suppression (pour ton restart_pod)
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]

  # 3. SMART PATCH & REMÉDIATION : Deployments
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"] # 👈 'patch' suffit pour ton body JSON

  # 4. MÉTRIQUES : Dashboard Health
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]

---
# 3. On lie au niveau du cluster
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k-guard-cluster-rb
subjects:
  - kind: ServiceAccount
    name: k-guard-sa
    namespace: k-guard
roleRef:
  kind: ClusterRole
  name: k-guard-cluster-role
  apiGroup: rbac.authorization.k8s.io