# 1. ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k-guard-sa
  namespace: k-guard-green
  
---
# 2. ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k-guard-cluster-rb-green
subjects:
  - kind: ServiceAccount
    name: k-guard-sa
    namespace: k-guard-green
roleRef:
  kind: ClusterRole
  name: k-guard-cluster-role 
  apiGroup: rbac.authorization.k8s.io