# 1. ServiceAccount Identity
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k-guard-sa
  namespace: k-guard
  
---
# 2. ClusterRole Definition
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k-guard-cluster-role
rules:
  # 1. OBSERVABILITY: Global Read-Only access
  - apiGroups: [""]
    resources: ["namespaces", "nodes", "events", "services"]
    verbs: ["get", "list", "watch"]

  # 2. POD MANAGEMENT: Read-Only + Log streaming
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "create", "list", "watch", "delete"]

  # 3. REMEDIATION ACTIONS: Specifically allows deletion for pod restarts
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"] # Required for the restart_pod logic

  # 4. SMART PATCHING: Deployment management
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"] 

  # 5. METRICS: Health Dashboard data source
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  
  # 6. NETWORK SENTINEL: Network Policy audit (Ansible Playbook integration)
  - apiGroups: ["networking.k8s.io"] 
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
# 3. ClusterRoleBinding (Linking Identity to Permissions)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k-guard-cluster-rb
subjects:
  - kind: ServiceAccount
    name: k-guard-sa
    namespace: k-guard
roleRef:
  kind: ClusterRole
  name: k-guard-cluster-role
  apiGroup: rbac.authorization.k8s.io