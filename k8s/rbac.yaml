# 1. Identité du ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k-guard-sa
  namespace: k-guard
  
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k-guard-cluster-role
rules:
  # 1. OBSERVABILITÉ : Lecture seule globale
  - apiGroups: [""]
    resources: ["namespaces", "nodes", "events", "services"]
    verbs: ["get", "list", "watch"]

  # 2. GESTION DES PODS : Lecture seule + Logs
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]

  # 3. ACTION DE REMÉDIATION : Autorise spécifiquement le delete et patch
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["delete"] # Nécessaire pour ton restart_pod

  # 4. SMART PATCH : Deployments
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"] 

  # 5. MÉTRIQUES : Dashboard Health
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods", "nodes"]
    verbs: ["get", "list"]
  
  # 6. NETWORK POLICIES : Network Sentinel (Ansible Playbook)
  - apiGroups: ["networking.k8s.io"] # LA LIGNE MANQUANTE
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]

---
# 3. Liaison (Binding)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k-guard-cluster-rb
subjects:
  - kind: ServiceAccount
    name: k-guard-sa
    namespace: k-guard
roleRef:
  kind: ClusterRole
  name: k-guard-cluster-role
  apiGroup: rbac.authorization.k8s.io