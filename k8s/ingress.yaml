apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: k-guard-ingress
  namespace: k-guard
spec:
  entryPoints:
    - web
  routes:
  - kind: Rule
    match: Host(`k-guard.local`) && PathPrefix(`/api`)
    services:
    - name: k-guard-backend-service # Le service ClusterIP port 8000
      port: 8000
  - kind: Rule
    match: Host(`k-guard.local`) && PathPrefix(`/`)
    services:
    - name: k-guard-frontend-service # Le service ClusterIP Port 80
      port: 80