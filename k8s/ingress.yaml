apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: k-guard-ingress-green
  namespace: k-guard-green
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: kguard-green.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: k-guard-service-green
            port:
              number: 8000