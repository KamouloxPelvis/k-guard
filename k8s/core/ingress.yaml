apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: k-guard-ingress
  namespace: k-guard
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  rules:
  - http:
      paths:
      # 1. K-Guard Frontend
      - path: /
        pathType: Prefix
        backend:
          service:
            name: k-guard-service
            port:
              number: 8000
      # 2. Kibana Service (redirected from /kibana)
      - path: /kibana/(.*)
        pathType: Prefix
        backend:
          service:
            name: kibana-service
            port:
              number: 5601