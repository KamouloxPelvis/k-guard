apiVersion: v1
kind: Service
metadata:
  name: k-guard-service
  namespace: k-guard
spec:
  selector:
    app: k-guard
  ports:
    - name: back
      port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: k-guard-frontend-service
  namespace: k-guard
spec:
  selector:
    app: k-guard
  ports:
    - name: front
      port: 80
      targetPort: 80