# 1. Backend Service: Exposes the FastAPI security engine
apiVersion: v1
kind: Service
metadata:
  name: k-guard-backend-service
  namespace: k-guard
spec:
  type: NodePort
  selector:
    app: k-guard # Matches the labels defined in your Deployment
  ports:
    - name: back
      protocol: TCP
      port: 8000       # Port used internally within the cluster
      targetPort: 8000 # Port where the FastAPI container is listening
      nodePort: 30002  # External port on the VPS IP (Cisco DevNet Lab friendly)

---

# 2. Frontend Service: Exposes the Vue.js Dashboard
apiVersion: v1
kind: Service
metadata:
  name: k-guard-frontend-service
  namespace: k-guard
spec:
  type: NodePort
  selector:
    app: k-guard
  ports:
    - name: front
      protocol: TCP
      port: 80         # Internal cluster port
      targetPort: 80   # Nginx frontend container port
      nodePort: 30081  # External access port for the Dashboard