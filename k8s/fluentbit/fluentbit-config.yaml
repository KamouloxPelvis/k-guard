apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: k-guard # Migration vers k-guard
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Log_Level     info
        Parsers_File  parsers.conf

    [INPUT]
        Name          tail
        Path          /var/log/containers/*falco*.log
        Parser        falco_json
        Tag           falco.alerts
        DB            /var/log/flb_falco.db

    [OUTPUT]
        Name          es
        Match         falco.*
        Host          elasticsearch-es-http.k-guard # DNS interne mis à jour
        Port          9200
        Index         falco-alerts
        HTTP_User     elastic
        HTTP_Passwd   CtWWmg5wkdQr8l8yUnI6jYw8
        tls           On
        tls.verify    Off
        Suppress_Type_Name On

  parsers.conf: |
    [PARSER]
        Name        falco_json
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L