apiVersion: v1
kind: ConfigMap
metadata:
  name: fluent-bit-config
  namespace: k-guard
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush         1
        Log_Level     debug
        Parsers_File  parsers.conf

    [INPUT]
        Name          tail
        Path          /var/log/falco/alerts.json
        Parser        falco_json
        Tag           falco.logs
        DB            /var/log/flb_falco.db
        Mem_Buf_Limit 5MB
        Skip_Long_Lines On
        Refresh_Interval 5
        Read_from_Head    On
        Ignore_Older      0

    [OUTPUT]
        Name          es
        Match         falco.*
        Host          elasticsearch-es-http.k-guard
        Port          9200
        Index         falco-alerts
        HTTP_User     elastic
        HTTP_Passwd   Li77c5dL9e8X2lio4AW8UD76
        tls           On
        tls.verify    Off
        Suppress_Type_Name On

  parsers.conf: |
    [PARSER]
        Name        falco_json
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
