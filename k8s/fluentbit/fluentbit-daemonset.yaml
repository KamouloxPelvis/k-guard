apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluent-bit
  namespace: k-guard
  labels:
    app: fluent-bit
spec:
  selector:
    matchLabels:
      app: fluent-bit
  template:
    metadata:
      labels:
        app: fluent-bit
    spec:
      serviceAccountName: fluent-bit
      containers:
      - name: fluent-bit
        image: fluent/fluent-bit:3.0.0
        securityContext:
          runAsUser: 0  # Force l'exécution en tant que root
          privileged: true # Donne accès total aux fichiers hôtes
        volumeMounts:
        - name: config
          mountPath: /fluent-bit/etc/
        - name: varlog
          mountPath: /var/log/containers
          readOnly: true
        - name: varlogpods
          mountPath: /var/log/pods
          readOnly: true
        - name: falco-logs
          mountPath: /var/log/falco
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: fluent-bit-config
      - name: varlog
        hostPath:
          path: /var/log/containers
      - name: varlogpods
        hostPath:
          path: /var/log/pods
      - name: falco-logs
        hostPath:
          path: /var/log/falco
