apiVersion: v1
kind: Namespace
metadata:
  name: k-guard

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: kguard-deployment
  namespace: k-guard
spec:
  replicas: 1
  strategy:
    type: Recreate # Préférable car on utilise un socket Docker et un cache local
  selector:
    matchLabels:
      app: k-guard
  template:
    metadata:
      labels:
        app: k-guard
    spec:
      serviceAccountName: k-guard-sa
      automountServiceAccountToken: true
      imagePullSecrets:
        - name: regcred

      securityContext:
        fsGroup: 1000
        supplementalGroups: [988] # ID du groupe docker sur ton VPS Kamatera

      volumes:
        - name: docker-socket
          hostPath:
            path: /var/run/docker.sock
            type: Socket
        - name: trivy-cache
          persistentVolumeClaim:
            claimName: trivy-cache-pvc

      containers:
      - name: kguard-app
        # Cette URL doit correspondre exactement à celle de ton registre GitLab
        image: registry.gitlab.com/portfolio-kamal-guidadou/k-guard/kguard-app:latest
        imagePullPolicy: Always
        securityContext:
          runAsUser: 1000
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 8000
        volumeMounts:
          - mountPath: /var/run/docker.sock
            name: docker-socket
          - mountPath: /data/trivy-cache
            name: trivy-cache
        envFrom:
          - secretRef:
              name: k-guard-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 45
          periodSeconds: 30
        resources:
          limits:
            cpu: "1.5"
            memory: "2Gi"
          requests:
            cpu: "500m"
            memory: "1Gi"

---

apiVersion: v1
kind: Service
metadata:
  name: kguard-service
  namespace: k-guard
spec:
  type: NodePort
  selector:
    app: k-guard
  ports:
    - protocol: TCP
      port: 80      # Port exposé en interne du cluster
      targetPort: 8000 # Port sur lequel FastAPI écoute dans le container
      nodePort: 30002 # Port accessible depuis l'IP du VPS