apiVersion: apps/v1
kind: Deployment
metadata:
  name: k-guard-deployment
  namespace: k-guard
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: k-guard
  template:
    metadata:
      labels:
        app: k-guard
    spec:
      serviceAccountName: k-guard-sa
      automountServiceAccountToken: true

      securityContext:
        fsGroup: 1000
        supplementalGroups: [988] 

      volumes:
        - name: docker-socket
          hostPath:
            path: /var/run/docker.sock
            type: Socket
        - name: trivy-cache
          persistentVolumeClaim:
            claimName: trivy-cache-pvc
        # Espaces d'écriture temporaires pour Nginx
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}

      containers:
      # --- 1. BACKEND (FastAPI + Trivy) ---
      - name: backend
        image: k-guard-backend:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 8000
        volumeMounts:
          - mountPath: /var/run/docker.sock
            name: docker-socket
          - mountPath: /data/trivy-cache
            name: trivy-cache
        envFrom:
          - secretRef:
              name: k-guard-secrets
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 30      
          failureThreshold: 5
        resources:
          limits:
            cpu: "1.5"
            memory: "2Gi"
          requests:
            cpu: "500m"
            memory: "1Gi"

      # --- 2. FRONTEND (Vue.js + Nginx) ---
      - name: frontend
        image: k-guard-frontend:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          runAsUser: 101 # UID par défaut de Nginx pour éviter les conflits
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true # On passe en lecture seule pour la Cyber !
        ports:
        - containerPort: 80
        volumeMounts:
          - mountPath: /var/cache/nginx
            name: nginx-cache
          - mountPath: /var/run
            name: nginx-run
        resources:
          limits:
            cpu: "200m"     
            memory: "1024Mi" 
          requests:
            cpu: "200m"
            memory: "512Mi"