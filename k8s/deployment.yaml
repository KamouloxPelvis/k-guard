apiVersion: apps/v1
kind: Deployment
metadata:
  name: kguard-deployment
  namespace: k-guard
spec:
  replicas: 1
  strategy:
    type: Recreate 
  selector:
    matchLabels:
      app: k-guard
  template:
    metadata:
      labels:
        app: k-guard
    spec:
      serviceAccountName: k-guard-sa
      automountServiceAccountToken: true
      
      imagePullSecrets:
        - name: ghcr-secret

      securityContext:
        fsGroup: 1000
        supplementalGroups: [988]

      volumes:
        - name: docker-socket
          hostPath:
            path: /var/run/docker.sock
            type: Socket
        - name: trivy-cache
          persistentVolumeClaim:
            claimName: trivy-cache-pvc
      
      initContainers:
      - name: init-permissions
        image: busybox
        command: ["sh", "-c", "chown -R 1000:1000 /data/trivy-cache && mkdir -p /data/trivy-cache/database && chown -R 1000:1000 /data/trivy-cache/database"]
        volumeMounts:
        - name: trivy-cache
          mountPath: /data/trivy-cache

      containers:
      - name: kguard-app
        image: ghcr.io/kamouloxpelvis/kguard-app:latest
        imagePullPolicy: Always
        securityContext:
          runAsUser: 1000 
          allowPrivilegeEscalation: false
        ports:
        - containerPort: 8000
        volumeMounts:
          - mountPath: /var/run/docker.sock
            name: docker-socket
          - mountPath: /data/trivy-cache
            name: trivy-cache
          - mountPath: /app/backend/data
            name: trivy-cache
            subPath: database 
        env:
          - name: DB_DIR
            value: "/app/backend/data"
        envFrom:
          - secretRef:
              name: k-guard-secrets
        
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 45
          periodSeconds: 30

      # Sidecar ajouté pour exposer les métriques sans modifier ton code Python
      - name: metrics-exporter
        image: nginx/nginx-prometheus-exporter:latest
        ports:
        - containerPort: 9113
          name: metrics
        args:
        - -nginx.scrape-uri=http://localhost:8000/metrics

        resources:
          limits:
            cpu: "1.5"
            memory: "2Gi"
          requests:
            cpu: "500m"
            memory: "1Gi"
