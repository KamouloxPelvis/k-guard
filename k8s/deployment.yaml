apiVersion: apps/v1
kind: Deployment
metadata:
  name: k-guard-deployment
  namespace: k-guard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k-guard
  template:
    metadata:
      labels:
        app: k-guard
    spec:
      serviceAccountName: k-guard-sa
      
      # --- VOLUMES (Pour permettre à Trivy de voir les images du VPS) ---
      volumes:
        - name: docker-socket
          hostPath:
            path: /var/run/docker.sock
            type: Socket
        # --- NOUVEAU VOLUME POUR LE CACHE ---
        - name: trivy-cache
          persistentVolumeClaim:
            claimName: trivy-cache-pvc

      containers:
      # --- 1. BACKEND (FastAPI + Trivy) ---
      - name: backend
        image: k-guard-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        
        # Montage du socket Docker
        volumeMounts:
          - mountPath: /var/run/docker.sock
            name: docker-socket
        # --- MONTAGE DU CACHE (A adapter selon ton Dockerfile) ---
          - mountPath: /root/.cache/trivy 
            name: trivy-cache

        envFrom:
          - secretRef:
              name: k-guard-secrets

        # Check de santé (Liveness)
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 45
          periodSeconds: 30      
          failureThreshold: 5

        # Limites de ressources
        resources:
          limits:
            cpu: "1.5"        # On lui donne 1 coeur et demi pour le scan
            memory: "2Gi"     # On monte à 2Go car Trivy est gourmand en DB
          requests:
            cpu: "500m"       # On assure un minimum de puissance pour l'API
            memory: "1Gi"     # On garantit 1Go pour être serein au repos

      # --- 2. FRONTEND (Vue.js + Nginx) ---
      - name: frontend
        image: k-guard-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "200m"     
            memory: "1024Mi" 
          requests:
            cpu: "200m"
            memory: "512Mi"